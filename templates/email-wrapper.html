<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{subject}}</title>
  <style>
    body { margin: 0; padding: 0; background-color: #f5f5f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .wrapper { max-width: 600px; margin: 0 auto; padding: 24px 16px; }
    .card { background: #ffffff; border-radius: 8px; padding: 32px; }
    .product-name { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #888888; margin: 0 0 8px; }
    .content h1 { font-size: 22px; font-weight: 700; color: #111111; margin: 0 0 16px; }
    .content h2 { font-size: 18px; font-weight: 600; color: #222222; margin: 24px 0 8px; }
    .content h3 { font-size: 15px; font-weight: 600; color: #333333; margin: 20px 0 6px; }
    .content p { font-size: 15px; line-height: 1.6; color: #444444; margin: 0 0 14px; }
    .content ul { padding-left: 20px; margin: 0 0 14px; }
    .content li { font-size: 15px; line-height: 1.6; color: #444444; margin-bottom: 4px; }
    .content a { color: #0070f3; text-decoration: none; }
    .content a:hover { text-decoration: underline; }
    .content strong { font-weight: 600; color: #222222; }
    .footer { margin-top: 24px; padding-top: 16px; border-top: 1px solid #eeeeee; font-size: 12px; color: #999999; line-height: 1.5; }
    .footer a { color: #999999; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="card">
      <p class="product-name">{{product_name}}</p>
      <div class="content">
        {{body_html}}
      </div>
      <div class="footer">
        <p>You're receiving this because you're a beta tester for {{product_name}}.<br>
        <a href="{{unsubscribe_url}}">Unsubscribe</a></p>
      </div>
    </div>
  </div>
</body>
</html>
