# Example product configuration
# Copy this file and fill in the details for each product
id: example-product
name: Example Product
voice: "Friendly and enthusiastic, with a focus on developer experience"
repo: "owner/repo"
emailSubjectTemplate: "{{weekOf}} Weekly Update — Example Product"  # or "Example Product v{{version}}" for release emails

# Optional: filter activity for monorepo products
# filter:
#   labels: ["example-product"]   # Filter PRs by GitHub label
#   paths: ["apps/example/"]      # Filter commits by path prefix
#   tag_prefix: "example/"        # Filter releases by tag prefix

# Optional: define multiple audiences with different voices
# When audiences are defined, voice and emailSubjectTemplate move into each audience.
# audiences:
#   - id: beta
#     voice: "Casual and enthusiastic, aimed at early adopters"
#     emailSubjectTemplate: "{{weekOf}} Beta Update — Example Product"  # or "Example Product v{{version}} Beta"
#   - id: enterprise
#     voice: "Professional and concise, focused on stability and compliance"
#     emailSubjectTemplate: "{{weekOf}} Release Notes — Example Product"  # or "Example Product v{{version}}"
#     from_name: "Example Product Team"

# Optional: social content pipeline configuration
social:
  platforms: [twitter, linkedin, bluesky]
  context: |
    Cryyer is an automated email update tool for software teams. It connects to your GitHub
    repo, uses LLMs to draft release notes and weekly updates in your product's voice,
    and sends them to your subscriber list. Designed for indie developers and small teams
    who want to keep users informed without manual effort.
  cta:
    default: "Try Cryyer"
    link: "https://github.com/atriumn/cryyer"
