name: Weekly Draft

on:
  schedule:
    - cron: '0 13 * * 1'  # Monday 8am ET / 1pm UTC
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  draft:
    name: Generate Weekly Draft Issues
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Generate draft issues
        run: node dist/draft.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CRYER_REPO: ${{ github.repository }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'anthropic' }}
          LLM_MODEL: ${{ vars.LLM_MODEL || '' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
