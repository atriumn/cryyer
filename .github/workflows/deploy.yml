name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest
        run: |
          cd /home/jeff/projects/cryyer
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Install dependencies
        run: |
          cd /home/jeff/projects/cryyer
          pnpm install --frozen-lockfile

      - name: Type check
        run: |
          cd /home/jeff/projects/cryyer
          pnpm run typecheck

      - name: Build
        run: |
          cd /home/jeff/projects/cryyer
          pnpm run build
