name: Social Send

on:
  issues:
    types: [closed]

jobs:
  send:
    if: contains(github.event.issue.labels.*.name, 'social-draft')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g @atriumn/cryyer@latest
      - name: Parse draft path from issue title
        id: parse
        run: |
          TITLE="${{ github.event.issue.title }}"
          # Extract filename from "Social draft: <filename>"
          FILENAME="${TITLE#Social draft: }"
          echo "draft-path=social-drafts/${FILENAME}" >> "$GITHUB_OUTPUT"
      - name: Send to Buffer
        run: cryyer social send "${{ steps.parse.outputs.draft-path }}"
        env:
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          BUFFER_PROFILE_TWITTER: ${{ secrets.BUFFER_PROFILE_TWITTER }}
          BUFFER_PROFILE_LINKEDIN: ${{ secrets.BUFFER_PROFILE_LINKEDIN }}
          BUFFER_PROFILE_BLUESKY: ${{ secrets.BUFFER_PROFILE_BLUESKY }}
