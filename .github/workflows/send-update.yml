name: Send Update

on:
  issues:
    types: [closed]

permissions:
  issues: write
  contents: read

jobs:
  send:
    name: Send Email Update
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'draft')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Send update emails
        run: node dist/send-on-close.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          FROM_NAME: ${{ secrets.FROM_NAME }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          SUBSCRIBER_STORE: ${{ secrets.SUBSCRIBER_STORE }}
          # Supabase (when SUBSCRIBER_STORE=supabase or unset)
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          # Google Sheets (when SUBSCRIBER_STORE=google-sheets)
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
